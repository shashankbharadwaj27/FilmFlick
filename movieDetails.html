<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFlick</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="header&footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <header>
        <div id="navbar">
            <div id="navbar"></div>
        <script>
            // Use fetch to load navbar.html
            fetch('navbar.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('navbar').innerHTML = html;
                })
              .catch(error => console.error('Error loading navbar:', error));
        </script>
        </div>
    </header>
    <div class="moviecontainer">
        <div id="poster">
            <img id="foregroundPoster">
        </div>
        <div class="movieDetails">
            <div id="movieName"></div>
            <div id="description"></div>
            <div id="runtimeLang"></div>
            <div id="director">Directed by <a href="" id="directorLink"></a></div>
        </div>
    </div>
    <h2>Cast</h2>
    <div class="cast">
        <div class="swiper">
            <div class="swiper-wrapper"></div>
            <!-- Add Arrows -->
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>
    <h2>Crew</h2>
    <div class="crew">
        <div class="swiper">
            <div class="swiper-wrapper"></div>
            <!-- Add Arrows -->
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>
        
    <footer>
        <div id="footer">  
            <script>
                // Use fetch to load footer.html
                fetch('footer.html')
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById('footer').innerHTML = html;
                    })
                  .catch(error => console.error('Error loading footer:', error));
            </script>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="moviedetails.js"></script>

</body>
</html>
