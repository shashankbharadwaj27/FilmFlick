<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFlick</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="homepage.css">
    <link rel="stylesheet" href="header&footer.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <header>
        <div id="navbar">
            <script>
                // Use fetch to load navbar.html
                fetch('navbar.html')
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById('navbar').innerHTML = html;
                    })
                  .catch(error => console.error('Error loading navbar:', error));
            </script>
            </div>
    </header>

    <div class="autoscrolldisplay">
      <div class="swiper mySwiper">
        <div class="swiper-wrapper"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
        <div class="autoplay-progress">
          <svg viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="20"></circle>
          </svg>
          <span></span>
        </div>
      </div>
    </div>
    
    <div class="Trending containers">
      <h2><p>Trending</p><a href="https://shashankbharadwaj27.github.io/FilmFlick/displaypage.html" class="viewMore">view more</a></h2>
      <div class="swiper">
          <div class="swiper-wrapper"></div>
          <!-- Add Arrows -->
          <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div>
      </div>
    </div>

      <div class="Top-rated containers">
        <h2><p>Top-rated</p><a href="https://shashankbharadwaj27.github.io/FilmFlick/displaypage.html" class="viewMore">view more</a></h2>
        <div class="swiper">
            <div class="swiper-wrapper"></div>
            <!-- Add Arrows -->
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
      </div>

  </div>

  <div class="nowShowing containers">
    <h2><p>Now Showing</p><a href="https://shashankbharadwaj27.github.io/FilmFlick/displaypage.html" class="viewMore">view more</a></h2>
    <div class="swiper">
      <div class="swiper-wrapper"></div>
      <!-- Add Arrows -->
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>

    <footer>
        <div id="footer">  
            <script>
                // Use fetch to load footer.html
                fetch('footer.html')
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById('footer').innerHTML = html;
                    })
                  .catch(error => console.error('Error loading footer:', error));
            </script>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <!-- Initialize Swiper -->
  <script>
    document.addEventListener("DOMContentLoaded",function(){
    const progressCircle = document.querySelector(".autoplay-progress svg");
    const progressContent = document.querySelector(".autoplay-progress span");
    var swiper = new Swiper(".mySwiper", {
      spaceBetween: 30,
      centeredSlides: true,
      autoplay: {
        delay: 5500,
        disableOnInteraction: false
      },
      pagination: {
        el: ".swiper-pagination",
        clickable: true
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev"
      },
      on: {
        autoplayTimeLeft(s, time, progress) {
          progressCircle.style.setProperty("--progress", 1 - progress);
          progressContent.textContent = `${Math.ceil(time / 1000)}s`;
        }
      }
    });
  });
  </script>
    <script src="script.js"></script>
    <!-- <script src="search.js"></script> -->
</body>
</html>
